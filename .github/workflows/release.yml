name: Release & Publish (Java)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:

  release:
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.released }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 WICHTIG: KEIN wildcard
      - name: Setup Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>

              <server>
                <id>github-bom</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-observability</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-kafka</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-logger</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-publish</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>

            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_READ_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release | tee log.txt
          if grep -q "Published release" log.txt; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi


  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git fetch origin main
          git checkout origin/main

      - run: grep -m1 "<version>" pom.xml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # 🔥 WICHTIG: KEIN wildcard
      - name: Setup Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>

              <server>
                <id>github-bom</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-observability</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-kafka</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-logger</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GH_PACKAGES_READ_TOKEN}</password>
              </server>

              <server>
                <id>github-publish</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>

            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_READ_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: mvn -B clean deploy -DskipTests