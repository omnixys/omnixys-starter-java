name: Release & Publish (Java)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:

  # =========================
  # RELEASE
  # =========================
  release:
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.released }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release | tee log.txt

          if grep -q "Published release" log.txt; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi


  # =========================
  # PUBLISH
  # =========================
  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure latest main (release commit)
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Print version from pom.xml
        run: |
          echo "Current pom version:"
          grep -m1 "<version>" pom.xml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # 🔐 CLEAN SPLIT: download vs publish
      - name: Setup Maven auth (READ + WRITE separated)
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>

                  <server>
                      <id>github-bom</id>
                      <username>${GITHUB_ACTOR}</username>
                      <password>${GH_PACKAGES_READ_TOKEN}</password>
                  </server>
              
                  <server>
                      <id>github-observability</id>
                      <username>${GITHUB_ACTOR}</username>
                      <password>${GH_PACKAGES_READ_TOKEN}</password>
                  </server>
              
                  <server>
                      <id>github-kafka</id>
                      <username>${GITHUB_ACTOR}</username>
                      <password>${GH_PACKAGES_READ_TOKEN}</password>
                  </server>
              
                  <server>
                      <id>github-logger</id>
                      <username>${GITHUB_ACTOR}</username>
                      <password>${GH_PACKAGES_READ_TOKEN}</password>
                  </server>

              <!-- 🔼 WRITE TOKEN (for publishing THIS package) -->
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>

            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_READ_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🚀 Build & Publish
      - name: Build & Publish
        run: mvn -B clean deploy -DskipTests